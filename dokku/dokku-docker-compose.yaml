services:
  dokku:
    image: dokku/dokku:0.37.10
    container_name: dokku
    network_mode: bridge
    ports:
      - "3022:22"    # git push deploys: ssh://dokku@nas:3022/<appname>
      - "8080:80"    # app HTTP — DSM nginx proxies *.dokku.home.arpa → localhost:8080
      - "8443:443"   # app HTTPS
    volumes:
      - dokku-data:/mnt/dokku
      - /var/run/docker.sock:/var/run/docker.sock
      # synology-proxy plugin: write nginx drop-in confs and reload DSM nginx
      - /usr/local/etc/nginx/conf.d:/usr/local/etc/nginx/conf.d
      - /bin/nginx:/usr/sbin/nginx:ro
      - /run/nginx.pid:/run/nginx.pid
      # synology-dns plugin: write to DSM bind9 zone files and run rndc
      - /var/packages/DNSServer/target/named:/var/packages/DNSServer/target/named
    environment:
      DOKKU_HOSTNAME: dokku.home.arpa
    restart: unless-stopped

volumes:
  dokku-data:
