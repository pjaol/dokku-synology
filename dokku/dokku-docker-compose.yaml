services:
  dokku:
    image: dokku/dokku:0.37.10
    container_name: dokku
    network_mode: bridge
    ports:
      - "3022:22"    # git push deploys: ssh://dokku@<nas>:3022/<appname>
      - "8080:80"    # DSM nginx wildcard proxies *.dokku.<zone> → here
      - "8443:443"
    volumes:
      - /var/lib/dokku:/var/lib/dokku
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      DOKKU_HOSTNAME: ${DOKKU_HOSTNAME:-dokku.home.arpa}
    restart: unless-stopped
